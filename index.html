<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Float Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1>CSS Float Kanban Board</h1>
        <div class="kanban-board clearfix">
            <div class="kanban-column todo-col">
                <div class="column-header">
                    <h2>To Do 📌</h2>
                    <span class="task-count">3</span>
                </div>
                <div class="column-content"></div>
                <div class="input">
                  <input type="text" class="0">
                  <button>+</button>
                </div>
            </div>

            <div class="kanban-column progress-col">
                <div class="column-header">
                    <h2>In Progress 🔨</h2>
                     <span class="task-count">2</span>
                </div>
                <div class="column-content"></div>
                <div class="input">
                  <input type="text" class="1">
                  <button>+</button>
                </div>
            </div>

            <div class="kanban-column done-col">
                <div class="column-header">
                    <h2>Done ✅</h2>
                     <span class="task-count">1</span>
                </div>
                <div class="column-content"></div>
                <div class="input">
                  <input type="text" class="2">
                  <button>+</button>
                </div>
            </div>
    <script src="./script.js"></script>
</body>
</html>
